<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Ledger</title>

<meta name="theme-color" content="#111111">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">


<div id="game-screen">

<section id="sydney" class="player top">

<div id="sydney-name" class="player-name">
Sydney
</div>

<div id="sydney-life" class="life">
20
</div>

<div class="controls">
<button id="sydney-minus">−</button>
<button id="sydney-plus">+</button>
</div>

</section>


<section id="center">

<div id="timer">
⏱ 00:00
</div>

</section>


<section id="adam" class="player bottom">

<div id="adam-name" class="player-name">
Adam
</div>

<div id="adam-life" class="life">
20
</div>

<div class="controls">
<button id="adam-minus">−</button>
<button id="adam-plus">+</button>
</div>

</section>

</div>



<div id="season-screen" class="hidden-page">

<h1>🏆 Season</h1>

<div class="stat-card">

<h2 id="season-adam-name"></h2>

<p>Wins: <span id="adam-wins">0</span></p>
<p>Losses: <span id="adam-losses">0</span></p>
<p>Win Rate: <span id="adam-rate">0%</span></p>

</div>


<div class="stat-card">

<h2 id="season-sydney-name"></h2>

<p>Wins: <span id="sydney-wins">0</span></p>
<p>Losses: <span id="sydney-losses">0</span></p>
<p>Win Rate: <span id="sydney-rate">0%</span></p>

</div>

</div>



<div id="history-screen" class="hidden-page">

<h1>📜 History</h1>

<div id="history-list">
<p>No games played yet.</p>
</div>

</div>



<!-- SETTINGS -->

<div id="settings-screen" class="hidden-page">

<h1>⚙️ Settings</h1>


<div class="stat-card">

<h2>Players</h2>


<button id="edit-adam-name">
Edit Adam Name
</button>


<button id="edit-sydney-name">
Edit Sydney Name
</button>


</div>



<div class="stat-card">

<h2>Starting Life</h2>


<button id="life-20">
20 Life
</button>

<button id="life-30">
30 Life
</button>

<button id="life-40">
40 Life
</button>


</div>



<div class="stat-card">

<h2>Data</h2>


<button id="reset-season">
Reset Season
</button>


<button id="clear-history">
Clear History
</button>


<button id="reset-all">
Reset Everything
</button>


</div>


</div>




<nav>

<button data-page="game">❤️</button>
<button data-page="season">🏆</button>
<button data-page="history">📜</button>
<button data-page="settings">⚙️</button>

</nav>



<div id="game-over" class="hidden">

<div class="modal">

<h1 id="winner-text">
Winner!
</h1>

<p id="final-time">
Time
</p>

<button id="undo-button">
Undo
</button>

<button id="next-game-button">
Next Game
</button>


</div>

</div>



</div>


<script src="script.js"></script>

</body>

</html>
