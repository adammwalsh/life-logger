<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Ledger</title>

<meta name="theme-color" content="#0a0e27">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">


<div id="game-screen">

<section id="sydney" class="player top">

    <div class="tap-zone plus"></div>

    <div class="life-container">
        <div id="sydney-life" class="life">20</div>
    </div>

    <div class="tap-zone minus"></div>

</section>


<section id="center">

<div id="timer">
⏱ 00:00
</div>

</section>

<section id="adam" class="player top">

    <div class="tap-zone plus"></div>

    <div class="life-container">
        <div id="adam-life" class="life">20</div>
    </div>

    <div class="tap-zone minus"></div>

</section>

</div>



<div id="season-screen" class="hidden-page">

<h1>🏆 Season</h1>

<div class="stat-card">

<h2 id="season-adam-name"></h2>

<p>Wins: <span id="adam-wins">0</span></p>
<p>Losses: <span id="adam-losses">0</span></p>

<button onclick="editSeason('bottom')">
Edit Adam Record
</button>

</div>

<div class="stat-card">

<h2 id="season-sydney-name"></h2>

<p>Wins: <span id="sydney-wins">0</span></p>
<p>Losses: <span id="sydney-losses">0</span></p>

<button onclick="editSeason('top')">
Edit Sydney Record
</button>

</div>

</div>



<div id="history-screen" class="hidden-page">

<h1>📜 History</h1>

<div id="history-list">
<p>No games played yet.</p>
</div>

</div>



<!-- SETTINGS -->

<div id="settings-screen" class="hidden-page">

<h1>⚙️ Settings</h1>

<div class="stat-card">

<h2>Starting Life</h2>

<button id="life-20">
20 Life
</button>

<button id="life-30">
30 Life
</button>

<button id="life-40">
40 Life
</button>

</div>


<div class="stat-card">

<h2>Data</h2>

<button id="reset-season">
Reset Season
</button>

<button id="clear-history">
Clear History
</button>

<button id="reset-all">
Reset Everything
</button>

</div>

</div>



<nav>


<button data-page="game" class="active">
❤️
<span>Game</span>
</button>

<button data-page="season">
🏆
<span>Season</span>
</button>

<button data-page="history">
📜
<span>History</span>
</button>

<button data-page="settings">
⚙️
<span>Settings</span>
</button>

</nav>



<div id="game-over" class="hidden">

<div class="modal">

<h1 id="winner-text">
Winner!
</h1>

<p id="final-time">
Time
</p>

<button id="undo-button">
Undo
</button>

<button id="next-game-button">
Next Game
</button>


</div>

</div>



</div>


<script src="script.js"></script>

</body>

</html>
