<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Life Ledger</title>

    <meta name="theme-color" content="#111111">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

    <section id="sydney" class="player top">

        <div id="sydney-name" class="player-name">
            Sydney
        </div>

        <div id="sydney-life" class="life">
            20
        </div>

        <div class="controls">
            <button id="sydney-minus">−</button>
            <button id="sydney-plus">+</button>
        </div>

    </section>


    <section id="center">

        <div id="timer">
            ⏱ 00:00
        </div>

    </section>


    <section id="adam" class="player bottom">

        <div id="adam-name" class="player-name">
            Adam
        </div>

        <div id="adam-life" class="life">
            20
        </div>

        <div class="controls">
            <button id="adam-minus">−</button>
            <button id="adam-plus">+</button>
        </div>

    </section>


</div>


<!-- Game Over Popup -->

<div id="game-over" class="hidden">

    <div class="modal">

        <h1 id="winner-text">
            Winner!
        </h1>

        <p id="final-time">
            Time: 00:00
        </p>

        <button id="undo-button">
            Undo
        </button>

        <button id="next-game-button">
            Next Game
        </button>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
