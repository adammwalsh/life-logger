<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Ledger</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>

<body>

<div id="app">

    <!-- Sydney -->
    <section id="sydney" class="player top">

        <div class="player-name">
            Sydney
        </div>

        <div id="sydney-life" class="life">
            20
        </div>

        <div class="controls">
            <button id="sydney-minus">−</button>
            <button id="sydney-plus">+</button>
        </div>

    </section>

    <!-- Center Timer -->
    <section id="center">

        <div id="timer">
            ⏱ 00:00
        </div>

    </section>

    <!-- Adam -->
    <section id="adam" class="player bottom">

        <div class="player-name">
            Adam
        </div>

        <div id="adam-life" class="life">
            20
        </div>

        <div class="controls">
            <button id="adam-minus">−</button>
            <button id="adam-plus">+</button>
        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
